name: youwee
base: core22
version: '0.17.0'
title: Youwee
summary: Ultimate yt-dlp GUI & Video Downloader - Free & Open Source
description: |
  Youwee is a modern desktop app for downloading, organizing, and processing
  online videos with yt-dlp, FFmpeg, AI summary, channel tracking, subtitles, and
  post-download workflows.
license: MIT
website: https://youwee.app
contact: https://discord.gg/yCrs9hcw
donation: https://github.com/sponsors/vanloctech
issues: https://github.com/vanloctech/youwee/issues
source-code: https://github.com/vanloctech/youwee

grade: stable
confinement: strict

layout:
  /usr/lib/$SNAPCRAFT_ARCH_TRIPLET/webkit2gtk-4.1:
    bind: $SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/webkit2gtk-4.1

apps:
  youwee:
    command: usr/bin/youwee
    desktop: usr/share/applications/Youwee.desktop
    extensions: [gnome]
    environment:
      GTK_MODULES: ''
      WEBKIT_DISABLE_DMABUF_RENDERER: '1'
      WEBKIT_DMABUF_RENDERER_DISABLE_GBM: '1'
    plugs:
      - network
      - home
      - removable-media
      - single-instance-plug

slots:
  single-instance:
    interface: dbus
    bus: session
    name: org.com_vanloctech_youwee.SingleInstance

plugs:
  single-instance-plug:
    interface: dbus
    bus: session
    name: org.com_vanloctech_youwee.SingleInstance

parts:
  youwee:
    plugin: dump
    source: .
    build-packages:
      - dpkg
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libayatana-appindicator3-1
      - libssl3
      - xdg-utils
    override-build: |
      set -eu

      DEB_FILE="$(find snap/local/input -maxdepth 1 -type f -name '*.deb' | sort | head -n 1)"
      if [ -z "$DEB_FILE" ]; then
        echo "No .deb file found in snap/local/input."
        exit 1
      fi

      dpkg -x "$DEB_FILE" "$SNAPCRAFT_PART_INSTALL/"

      test -x "$SNAPCRAFT_PART_INSTALL/usr/bin/youwee"
      test -x "$SNAPCRAFT_PART_INSTALL/usr/bin/youwee-yt-dlp"
      test -f "$SNAPCRAFT_PART_INSTALL/usr/share/applications/Youwee.desktop"
      test -f "$SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/32x32/apps/youwee.png"

      sed -i \
        -e "s|^Icon=.*|Icon=/usr/share/icons/hicolor/32x32/apps/youwee.png|g" \
        -e "s|^Exec=.*|Exec=youwee %U|g" \
        "$SNAPCRAFT_PART_INSTALL/usr/share/applications/Youwee.desktop"
