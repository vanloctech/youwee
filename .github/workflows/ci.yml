name: CI

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - '.gitignore'

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Create placeholder yt-dlp binary for check
        run: |
          mkdir -p src-tauri/bin
          touch src-tauri/bin/youwee-yt-dlp-x86_64-unknown-linux-gnu
          chmod +x src-tauri/bin/youwee-yt-dlp-x86_64-unknown-linux-gnu

      - name: Check frontend (Biome)
        run: bun run lint

      - name: Check TypeScript
        run: bun run build

      - name: Check Rust
        working-directory: src-tauri
        run: cargo check

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

  build-test:
    needs: check
    runs-on: ${{ matrix.platform }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            yt_dlp_name: youwee-yt-dlp-aarch64-apple-darwin
            yt_dlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
          
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            yt_dlp_name: youwee-yt-dlp-x86_64-unknown-linux-gnu
            yt_dlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Download yt-dlp binary
        run: |
          mkdir -p src-tauri/bin
          curl -L -o "src-tauri/bin/${{ matrix.yt_dlp_name }}" "${{ matrix.yt_dlp_url }}"
          chmod +x "src-tauri/bin/${{ matrix.yt_dlp_name }}"

      - name: Build Tauri app (compile-only, unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: bun run tauri
          args: --target ${{ matrix.target }} --no-bundle

      - name: Skip artifact upload for no-bundle build
        run: echo "build-test runs compile-only validation with --no-bundle; no bundle artifacts are uploaded."
